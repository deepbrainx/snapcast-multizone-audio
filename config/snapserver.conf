[server]
threads = -1

[stream]
# AirPlay 2 streams — one per zone, increment port for each
source = airplay:///shairport-sync?name=Kitchen&devicename=Kitchen&port=5000
source = airplay:///shairport-sync?name=Dining&devicename=Dining&port=5001
# Add more zones:
# source = airplay:///shairport-sync?name=LivingRoom&devicename=LivingRoom&port=5002
# source = airplay:///shairport-sync?name=Backyard&devicename=Backyard&port=5003

# TCP source for TTS announcements from Home Assistant
source = tcp://127.0.0.1:4953?name=TTS&mode=server

[http]
enabled = true
port = 1780
# Serve Snapweb UI
doc_root = /usr/share/snapweb/

[audio]
buffer = 1000
codec = flac
send_to_muted = false
